<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>던전 원정대</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#050810;color:#dde;
  font-family:'Noto Sans KR',sans-serif;
  overflow:hidden;width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}

/* ── 로비 ── */
#lobby{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 60%, #0d1230 0%, #050810 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;z-index:200;
}
#lobby h1{
  font-family:'Black Han Sans',sans-serif;font-size:3rem;
  color:#d4a832;letter-spacing:8px;
  text-shadow:0 0 60px #d4a83255, 0 0 120px #d4a83222;
}
.lobby-sub{font-size:.85rem;color:#667;letter-spacing:2px;}
.key-box{
  background:#0b0d1e;border:1px solid #2a2d50;border-radius:12px;
  padding:18px 32px;font-size:.82rem;color:#99b;line-height:2.5;text-align:center;
}
.key-box b{color:#d4a832;}
#start-btn{
  background:linear-gradient(135deg,#d4a832,#f0c84a);
  color:#111;border:none;border-radius:10px;
  padding:14px 44px;font-family:'Black Han Sans',sans-serif;
  font-size:1.3rem;letter-spacing:4px;cursor:pointer;
  box-shadow:0 4px 30px #d4a83244;transition:.15s;
  margin-top:8px;
}
#start-btn:hover{transform:translateY(-3px);box-shadow:0 8px 40px #d4a83266;}

/* ── 게임 ── */
#game{display:none;position:fixed;inset:0;}
canvas{display:block;}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;pointer-events:none;z-index:10;
}
.p-card{
  background:#0a0c1acc;border:1px solid #2a2d50;
  border-radius:8px;padding:8px 13px;min-width:130px;
  backdrop-filter:blur(6px);
}
.p-name{font-size:.72rem;font-weight:700;margin-bottom:5px;
  display:flex;align-items:center;gap:6px;}
.p-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.hp-track{height:5px;background:#1a1a30;border-radius:3px;overflow:hidden;}
.hp-fill{height:100%;border-radius:3px;transition:width .12s;}
.hp-num{font-size:.6rem;color:#667;margin-top:2px;}

#stat-box{
  margin-left:auto;
  background:#0a0c1acc;border:1px solid #2a2d50;border-radius:8px;
  padding:8px 14px;font-size:.72rem;color:#99b;text-align:right;
  backdrop-filter:blur(6px);line-height:2;
}
#stat-box span{color:#d4a832;font-weight:700;font-family:'Black Han Sans',sans-serif;}

/* ── 보스 HP ── */
#boss-bar{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:#0a0c1acc;border:1px solid #f40;border-radius:10px;
  padding:8px 24px;min-width:380px;text-align:center;
  display:none;backdrop-filter:blur(6px);z-index:10;
}
#boss-title{font-family:'Black Han Sans',sans-serif;font-size:.85rem;
  color:#f84;letter-spacing:2px;}
#boss-hp-track{height:8px;background:#1a1020;border-radius:4px;margin-top:6px;overflow:hidden;}
#boss-hp-fill{height:100%;background:linear-gradient(90deg,#c00,#f40,#f80);
  border-radius:4px;transition:width .18s;}

/* ── 미니맵 ── */
#mm-wrap{
  position:fixed;bottom:12px;right:12px;
  background:#08091588;border:1px solid #2a2d50;border-radius:8px;
  padding:6px;backdrop-filter:blur(4px);z-index:10;
}
#mm-wrap p{font-size:.58rem;color:#556;text-align:center;margin-top:3px;}

/* ── 로그 ── */
#log{
  position:fixed;bottom:12px;left:12px;
  background:#0a0c1acc;border:1px solid #2a2d50;border-radius:8px;
  padding:9px 12px;max-width:260px;backdrop-filter:blur(6px);z-index:10;
}
.le{font-size:.63rem;color:#778;line-height:1.75;
  border-left:2px solid #334;padding-left:6px;margin-bottom:1px;}
.le.kill{color:#faa;border-left-color:#f44;}
.le.dmg{color:#fc9;border-left-color:#f80;}
.le.boss{color:#ffd700;border-left-color:#f80;font-weight:700;}
.le.win{color:#3de;border-left-color:#3da;font-weight:700;}
.le.death{color:#f55;border-left-color:#f00;}

/* ── 조작 힌트 ── */
#hint{
  position:fixed;top:12px;right:12px;
  background:#0a0c1acc;border:1px solid #2a2d50;border-radius:8px;
  padding:8px 12px;font-size:.62rem;color:#556;
  backdrop-filter:blur(6px);line-height:2;z-index:10;pointer-events:none;
}

/* ── 알림 배너 ── */
#alert{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  display:none;background:#f40dd;border:2px solid #f84;border-radius:12px;
  padding:16px 36px;text-align:center;z-index:50;pointer-events:none;
}
#alert h3{font-family:'Black Han Sans',sans-serif;font-size:1.5rem;
  color:#fff;letter-spacing:3px;text-shadow:0 0 20px #f84;}

/* ── 엔딩 ── */
#ending{
  position:fixed;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:#000000cc;gap:20px;z-index:100;
}
#ending h2{font-family:'Black Han Sans',sans-serif;font-size:2.6rem;letter-spacing:4px;}
#ending p{font-size:.9rem;color:#aab;}
#retry-btn{
  background:#d4a832;color:#111;border:none;border-radius:8px;
  padding:12px 36px;font-family:'Black Han Sans',sans-serif;
  font-size:1.1rem;letter-spacing:3px;cursor:pointer;margin-top:8px;
  transition:.15s;
}
#retry-btn:hover{transform:translateY(-2px);}

/* ── 스킬 바 ── */
#skill-bar{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;z-index:10;pointer-events:none;
}
.skill-slot{
  width:52px;height:52px;border-radius:10px;
  background:#0a0c1acc;border:2px solid #2a2d50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;backdrop-filter:blur(6px);font-size:1.4rem;
}
.skill-slot .sk-key{
  position:absolute;top:2px;left:4px;
  font-size:.5rem;color:#888;font-family:'Noto Sans KR';
}
.skill-slot .sk-cd{
  position:absolute;bottom:0;left:0;right:0;
  background:#0008;border-radius:0 0 8px 8px;
  font-size:.55rem;color:#aac;text-align:center;padding:1px 0;
}
.skill-slot.ready{border-color:#44aaff;box-shadow:0 0 10px #44aaff44;}
.skill-slot.active{border-color:#fff;box-shadow:0 0 18px #fff6;}

/* ── 아이템 목록 ── */
#item-tray{
  position:fixed;top:60px;left:14px;
  background:#0a0c1acc;border:1px solid #2a2d50;border-radius:8px;
  padding:8px 10px;backdrop-filter:blur(6px);z-index:10;
  font-size:.65rem;color:#99b;min-width:110px;
}
#item-tray .it-title{color:#d4a832;font-weight:700;margin-bottom:5px;font-size:.68rem;}
.it-row{display:flex;align-items:center;gap:6px;line-height:1.9;}
</style>
</head>
<body>

<!-- 로비 -->
<div id="lobby">
  <h1>⚔ 던전 원정대</h1>
  <div class="lobby-sub">어둠의 던전을 탐험하라</div>
  <div class="key-box">
    <b>↑↓←→</b> 이동 &nbsp;|&nbsp; <b>SPACE</b> 총알 발사<br>
    <b>Z</b> 폭탄 투척 &nbsp;|&nbsp; <b>X</b> 방패막 &nbsp;|&nbsp; <b>C</b> 번개 범위공격<br>
    안개 속 보스 방 탐험 · 아이템 드랍 획득<br>

  </div>
  <!-- 1인 플레이 -->
  <button id="start-btn">혼자 탐험하기</button>

  <div style="color:#445;font-size:.75rem;margin-top:4px">── 또는 ──</div>

  <!-- 멀티플레이어 -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;
    background:#0b0d1e;border:1px solid #2a2d50;border-radius:12px;padding:18px 28px;">
    <div style="font-family:'Black Han Sans',sans-serif;font-size:.9rem;color:#d4a832;letter-spacing:2px">🌐 멀티플레이어 (최대 3인)</div>
    <input id="server-url" placeholder="wss://your-app.onrender.com"

    <button id="multi-btn" style="background:linear-gradient(135deg,#2a6,#4b8);
      color:#fff;border:none;border-radius:8px;padding:10px 28px;

      cursor:pointer;box-shadow:0 2px 16px #2a644444;">

    <div id="multi-status" style="font-size:.7rem;color:#5a8;min-height:1.2em;"></div>

<!-- 게임 -->
<div id="game">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="p-card" id="pc0">
      <div class="p-name"><span class="p-dot" style="background:#44aaff"></span>용사</div>
      <div class="hp-track"><div class="hp-fill" id="hf0" style="background:#44aaff;width:100%"></div></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  상수
// ═══════════════════════════════════════════════════════
const MAP_W   = 3200, MAP_H   = 2400;
const TILE    = 48;
const COLS    = MAP_W / TILE | 0;   // 66
const ROWS    = MAP_H / TILE | 0;   // 50
const SIGHT_R = 480;
const P_SPEED = 3.0;
const P_HP    = 120;
const P_ATK   = 32;
const P_RANGE = 68;
const P_CD    = 22;
const IFRAMES = 48;
const BULLET_SPEED = 10;
const BULLET_LEN   = 24;
const BULLET_RANGE = 360;
// 스킬 쿨다운 (프레임)
const CD_BOMB    = 360;  // Z: 폭탄 6초
const CD_SHIELD  = 480;  // X: 방패 8초
const CD_THUNDER = 300;  // C: 번개 5초

// ═══════════════════════════════════════════════════════
//  캔버스
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const mmCv   = document.getElementById('mm');
const mmCtx  = mmCv.getContext('2d');

function resizeCanvas(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ═══════════════════════════════════════════════════════
//  맵 생성
// ═══════════════════════════════════════════════════════
let tiles;   // Uint8Array COLS*ROWS  0=floor 1=wall
let explored;// Uint8Array COLS*ROWS  0/1

function tileAt(c,r){
  if(c<0||c>=COLS||r<0||r>=ROWS) return 1;
  return tiles[r*COLS+c];
}
function setTile(c,r,v){
  if(c<0||c>=COLS||r<0||r>=ROWS) return;
  tiles[r*COLS+c]=v;
}

function buildMap(){
  tiles    = new Uint8Array(COLS*ROWS).fill(1);
  explored = new Uint8Array(COLS*ROWS);

  // ── BSP 방 생성 ───────────────────────────────────
  const rooms = [];
  function carveRoom(x,y,w,h){
    for(let r=y;r<y+h;r++)
      for(let c=x;c<x+w;c++) setTile(c,r,0);
    rooms.push({cx:x+(w>>1), cy:y+(h>>1), x,y,w,h});
  }
  // 규칙적 룸 배치
  const roomGrid = [
    [2,2,10,8],[16,2,11,8],[31,2,10,8],[45,2,11,8],[58,2,7,8],
    [2,13,10,9],[15,13,12,9],[30,13,11,9],[44,13,11,9],[57,13,8,9],
    [2,25,10,9],[14,25,13,9],[30,25,12,9],[45,25,11,9],[57,25,8,9],
    [2,37,10,10],[15,37,12,10],[30,37,11,10],[44,37,11,10],[57,37,8,10],
  ];
  roomGrid.forEach(([x,y,w,h])=>carveRoom(x,y,w,h));

  // 통로 연결 (수평 + 수직 L자)
  function carveCorridor(ax,ay,bx,by){
    const minX=Math.min(ax,bx), maxX=Math.max(ax,bx);
    for(let c=minX;c<=maxX;c++){setTile(c,ay,0);setTile(c,ay-1,0);setTile(c,ay+1,0);}
    const minY=Math.min(ay,by), maxY=Math.max(ay,by);
    for(let r=minY;r<=maxY;r++){setTile(bx,r,0);setTile(bx-1,r,0);setTile(bx+1,r,0);}
  }
  for(let i=0;i<rooms.length-1;i++) carveCorridor(rooms[i].cx,rooms[i].cy,rooms[i+1].cx,rooms[i+1].cy);
  // 열 사이 연결
  for(let i=0;i<rooms.length-4;i+=4) if(rooms[i+4]) carveCorridor(rooms[i].cx,rooms[i].cy,rooms[i+4].cx,rooms[i+4].cy);

  // ── 보스 방 (오른쪽 하단) ─────────────────────────
  const bArena = {x: MAP_W-860, y: MAP_H-780, w:800, h:720};
  const bc = Math.floor(bArena.x/TILE), br = Math.floor(bArena.y/TILE);
  const bw = Math.ceil(bArena.w/TILE), bh = Math.ceil(bArena.h/TILE);
  for(let r=br;r<br+bh;r++)
    for(let c=bc;c<bc+bw;c++) setTile(c,r,0);
  // 보스 방 입구 통로
  const entryR = br + (bh>>1);
  for(let r=entryR-4;r<=entryR+4;r++)
    for(let c=bc-8;c<=bc;c++) setTile(c,r,0);

  return { rooms, bArena };
}

// ═══════════════════════════════════════════════════════
//  충돌
// ═══════════════════════════════════════════════════════
function isWall(wx,wy){
  return tileAt(wx/TILE|0, wy/TILE|0) === 1;
}
function moveSlide(ox,oy,nx,ny,r=13){
  // X축 시도
  const xOk = !isWall(nx+r,oy) && !isWall(nx-r,oy) && !isWall(nx,oy+r) && !isWall(nx,oy-r);
  const yOk = !isWall(ox,ny+r) && !isWall(ox,ny-r) && !isWall(ox+r,ny) && !isWall(ox-r,ny);
  return { x: xOk?nx:ox, y: yOk?ny:oy };
}

// ═══════════════════════════════════════════════════════
//  게임 상태
// ═══════════════════════════════════════════════════════
let player, monsters, particles, attackFx;
let camX=0, camY=0;
let kills=0, tick=0;
let bullets=[], bombs=[], dangerZonesFx=[], items=[];
let skillCd={bomb:0, shield:0, thunder:0};
let shieldActive=0; // 방패 지속 프레임
let bossArena, bossSpawned=false, bossDefeated=false;
let gameRunning=false, gameWon=false, gameOver=false;
let screenShake=0;
let spawnTimer=0;
let logEntries=[];

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault(); doAttack();}
  if(e.key==='z'||e.key==='Z') doSkillBomb();
  if(e.key==='x'||e.key==='X') doSkillShield();
  if(e.key==='c'||e.key==='C') doSkillThunder();
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

// ═══════════════════════════════════════════════════════
//  초기화
// ═══════════════════════════════════════════════════════
function initGame(){
  const {rooms, bArena} = buildMap();
  bossArena    = bArena;
  bossSpawned  = false;
  bossDefeated = false;
  gameRunning  = true;
  gameWon      = false;
  gameOver     = false;
  kills        = 0;
  tick         = 0;
  spawnTimer   = 0;
  logEntries   = [];
  screenShake  = 0;
  particles    = [];
  attackFx     = [];
  bullets      = [];
  bombs        = [];
  dangerZonesFx= [];
  items        = [];
  skillCd      = {bomb:0, shield:0, thunder:0};
  shieldActive = 0;
  monsters     = [];

  // 시작 위치 (첫 번째 방 중앙)
  const sr = rooms[0];
  player = {
    x: sr.cx * TILE, y: sr.cy * TILE,
    hp: P_HP, maxHp: P_HP,
    alive: true, iframes: 0, attackCd: 0,
    facing: 0, // 오른쪽이 기본
  };
  camX = player.x - canvas.width/2;
  camY = player.y - canvas.height/2;
  // 캐시 초기화
  _tilesDirty=true; _tileCanvas=null; _tileCtx=null;
  _mmDirty=true; _mmCanvas=null; _mmCtx2=null;
  window._fog=null; window._fogC=null;

  // 초기 몬스터 배치 (보스 방 제외)
  for(let i=0;i<28;i++) spawnMonster();

  addLog('⚔ 던전 탐험을 시작합니다!');
  addLog('보스 방을 찾아 던전의 군주를 처치하라!');

  // 게임 UI
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('ending').style.display='none';

  if(!rafId) loop();
}

// ═══════════════════════════════════════════════════════
//  몬스터
// ═══════════════════════════════════════════════════════
// attackStyle: fill_circle / fill_cone / fill_cross / fill_line / fill_ring / fill_scatter
const MTYPE = {
  // 원형: 원이 꽉 차면 전방위 폭발
  goblin: { hp:55,  atk:18, spd:1.9, range:60,  warn:90,  cd:115, size:12, score:10, col:'#3c9', attackStyle:'fill_circle' },
  // 십자: 십자 모양이 차면 상하좌우로 레이저 쏨
  orc:    { hp:105, atk:32, spd:1.2, range:90,  warn:110, cd:145, size:17, score:20, col:'#e63', attackStyle:'fill_cross'  },
  // 산탄: 원 안에서 8방향 총알이 퍼짐
  shade:  { hp:45,  atk:22, spd:2.9, range:55,  warn:75,  cd:95,  size:11, score:15, col:'#99f', attackStyle:'fill_scatter'},
  // 직선 레이저: 바가 꽉 차면 방향 레이저 발사
  archer: { hp:65,  atk:24, spd:1.0, range:200, warn:145, cd:155, size:13, score:18, col:'#4c8', attackStyle:'fill_line'   },
  // 링 수축: 링이 안으로 수축하면서 폭발
  mage:   { hp:75,  atk:30, spd:0.9, range:110, warn:125, cd:165, size:14, score:25, col:'#c7f', attackStyle:'fill_ring'   },
  // 원뿔: 원뿔 모양이 차면 그 방향으로 쐐기 공격
  hunter: { hp:80,  atk:26, spd:1.5, range:130, warn:120, cd:140, size:15, score:22, col:'#fa4', attackStyle:'fill_cone'   },
  // 보스: 페이즈별 복합 패턴
  boss:   { hp:900, atk:55, spd:1.3, range:120, warn:155, cd:175, size:30, score:500,col:'#f40', attackStyle:'fill_cross'  },
};
const MEMOJI={ goblin:'👺',orc:'👹',shade:'👻',archer:'🏹',mage:'🔮',hunter:'🏃',boss:'👑' };
let nextId=1;

function spawnMonster(type){
  // 랜덤 빈 타일 위치 (보스 방 밖)
  let x,y,tries=0;
  const types=['goblin','orc','shade','archer','mage','hunter'];
  type = type || types[Math.random()*types.length|0];
  do {
    x = (1+Math.random()*(COLS-2))*TILE;
    y = (1+Math.random()*(ROWS-2))*TILE;
    tries++;
  } while(
    (isWall(x,y) ||
    Math.hypot(x-player.x,y-player.y)<280 ||
    (x>bossArena.x-100 && y>bossArena.y-100)) && tries<80
  );
  if(tries>=80) return;
  const cfg=MTYPE[type];
  monsters.push({
    id:nextId++, type, x, y,
    hp:cfg.hp, maxHp:cfg.hp,
    atk:cfg.atk, spd:cfg.spd,
    range:cfg.range, warn:cfg.warn,
    cd:cfg.cd, size:cfg.size,
    score:cfg.score, col:cfg.col,
    attackStyle:cfg.attackStyle||'fill_circle',
    attackCd: (Math.random()*cfg.cd)|0,
    warnPhase:false, alive:true,
    enraged:false, phase:0,
    aimAngle:0,   // 경고 시작 시 고정된 공격 각도
    bossPhase:0,  // 보스 페이즈 카운터
  });
}

function spawnBoss(){
  const cfg=MTYPE.boss;
  const bx=bossArena.x+bossArena.w/2;
  const by=bossArena.y+bossArena.h/2;
  monsters.push({
    id:nextId++, type:'boss', x:bx, y:by,
    hp:cfg.hp, maxHp:cfg.hp,
    atk:cfg.atk, spd:cfg.spd,
    range:cfg.range, warn:cfg.warn,
    cd:cfg.cd, size:cfg.size,
    score:cfg.score, col:cfg.col,
    attackCd:80, warnPhase:false, alive:true,
    enraged:false, phase:0,
  });
  bossSpawned=true;
  screenShake=60;
  showAlert('👑  던전의 군주 등장!');
  addLog('👑 던전의 군주가 각성했다!!!','boss');
  document.getElementById('boss-bar').style.display='block';
}

// ═══════════════════════════════════════════════════════
//  공격
// ═══════════════════════════════════════════════════════
function doAttack(){
  if(!gameRunning||!player.alive||player.attackCd>0) return;
  player.attackCd=P_CD;
  // 마지막 이동 방향으로 발사 (유도 없음)
  const angle = player.facing !== undefined ? player.facing : 0;
  bullets.push({
    x:player.x, y:player.y,
    vx:Math.cos(angle)*BULLET_SPEED,
    vy:Math.sin(angle)*BULLET_SPEED,
    dist:0, angle, alive:true,
  });
}

function doSkillBomb(){
  if(!gameRunning||!player.alive||skillCd.bomb>0) return;
  skillCd.bomb=CD_BOMB;
  const angle=player.facing!==undefined?player.facing:0;
  bombs.push({
    x:player.x, y:player.y,
    vx:Math.cos(angle)*5, vy:Math.sin(angle)*5,
    dist:0, maxDist:200, exploded:false, explodeTimer:0,
    radius:0, maxRadius:90, alive:true,
  });
  addLog('💣 폭탄 투척!');
}

function doSkillShield(){
  if(!gameRunning||!player.alive||skillCd.shield>0) return;
  skillCd.shield=CD_SHIELD;
  shieldActive=120; // 2초 방패
  addLog('🛡 방패막 발동! 2초간 무적');
}

function doSkillThunder(){
  if(!gameRunning||!player.alive||skillCd.thunder>0) return;
  skillCd.thunder=CD_THUNDER;
  // 주변 반경 180 내 모든 몬스터에 번개 피해
  const THUNDER_R=180, THUNDER_DMG=55;
  let hit=0;
  monsters.forEach(m=>{
    if(!m.alive) return;
    if(Math.hypot(m.x-player.x,m.y-player.y)<THUNDER_R){
      m.hp-=THUNDER_DMG;
      spawnParticles(m.x,m.y,'#ccf',10);
      hit++;
      if(m.hp<=0) killMonster(m);
    }
  });
  // 번개 시각 이펙트
  dangerZonesFx.push({x:player.x,y:player.y,r:THUNDER_R,life:25,col:'#aaf',type:'thunder'});
  addLog(`⚡ 번개 범위공격! ${hit}마리 피격`,'kill');
}

function killMonster(m){
  m.alive=false; kills++;
  spawnParticles(m.x,m.y,'#ffd700',16);
  // 아이템 드랍 (30% 확률)
  if(Math.random()<0.30){
    const iTypes=['hp','bomb_charge','shield_charge','thunder_charge','speed'];
    const it=iTypes[Math.random()*iTypes.length|0];
    items.push({x:m.x,y:m.y,type:it,life:600,pulse:0});
  }
  if(m.type==='boss'){
    bossDefeated=true; gameWon=true; gameRunning=false;
    addLog('🏆 던전의 군주 처치! 원정 성공!','win');
    setTimeout(()=>showEnding(true),800);
  } else {
    addLog(`${MEMOJI[m.type]} ${m.type} 처치! +${m.score}점`,'kill');
  }
}

const ITEM_EMOJI={hp:'❤️',bomb_charge:'💣',shield_charge:'🛡',thunder_charge:'⚡',speed:'👟'};
const ITEM_COL  ={hp:'#f44',bomb_charge:'#fa0',shield_charge:'#4af',thunder_charge:'#ccf',speed:'#4f8'};

// ═══════════════════════════════════════════════════════
//  파티클
// ═══════════════════════════════════════════════════════
function spawnParticles(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=1.2+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:25+Math.random()*20|0, col, r:1.5+Math.random()*2.5});
  }
}

// ═══════════════════════════════════════════════════════
//  업데이트
// ═══════════════════════════════════════════════════════
function update(){
  if(!gameRunning) return;
  tick++;

  // ── 플레이어 이동 ─────────────────────────────────
  if(player.alive){
    if(player.iframes>0) player.iframes--;
    if(player.attackCd>0) player.attackCd--;

    let dx=0,dy=0;
    if(keys['ArrowUp']   ||keys['w']||keys['W']) dy-=1;
    if(keys['ArrowDown'] ||keys['s']||keys['S']) dy+=1;
    if(keys['ArrowLeft'] ||keys['a']||keys['A']) dx-=1;
    if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
    if(dx||dy){
      const len=Math.hypot(dx,dy);
      player.facing = Math.atan2(dy,dx);
      const spd2 = P_SPEED*(player.speedBoost>0?1.7:1);
      const nx=player.x+(dx/len)*spd2;
      const ny=player.y+(dy/len)*spd2;
      const r=moveSlide(player.x,player.y,nx,ny);
      player.x=Math.max(TILE,Math.min(MAP_W-TILE,r.x));
      player.y=Math.max(TILE,Math.min(MAP_H-TILE,r.y));
    }

    // 보스 방 진입
    if(!bossSpawned){
      const ba=bossArena;
      if(player.x>ba.x&&player.x<ba.x+ba.w&&player.y>ba.y&&player.y<ba.y+ba.h){
        spawnBoss();
      }
    }
  }

  // ── 몬스터 AI ────────────────────────────────────
  monsters.forEach(m=>{
    if(!m.alive) return;
    m.phase++;
    const dx=player.x-m.x, dy=player.y-m.y;
    const d=Math.hypot(dx,dy);
    const aggroR = m.type==='boss'?700:300;

    // 이동
    if(d<aggroR && d>m.range*0.75){
      const spd=m.enraged?m.spd*1.55:m.spd;
      const nx=m.x+(dx/d)*spd, ny=m.y+(dy/d)*spd;
      const r=moveSlide(m.x,m.y,nx,ny,m.size*0.7);
      m.x=r.x; m.y=r.y;
    }

    m.attackCd--;
    m.warnPhase = m.attackCd<=m.warn && m.attackCd>0 && d<m.range*2.2;

    // 격노
    if(m.type==='boss'&&!m.enraged&&m.hp<m.maxHp*0.5){
      m.enraged=true; m.cd=(m.cd*0.62)|0;
      addLog('🔥 보스가 격노했습니다!','boss');
    }

    // 경고 시작 시 각도 고정
    if(m.attackCd===m.warn){
      m.aimAngle = Math.atan2(dy, dx);
    }

    // 공격 발동
    if(m.attackCd<=0){
      m.attackCd = m.enraged ? (m.cd*0.65)|0 : m.cd;
      if(!player.alive) return;
      const style = m.attackStyle||'fill_circle';
      const shielded = shieldActive>0 || player.iframes>0;

      // 보스 페이즈마다 패턴 순환
      if(m.type==='boss'){
        m.bossPhase=(m.bossPhase+1)%4;
        const bpat=['fill_cross','fill_scatter','fill_cone','fill_ring'][m.bossPhase];
        m.attackStyle = m.enraged
          ? ['fill_cross','fill_scatter','fill_cone','fill_scatter'][m.bossPhase]
          : bpat;
      }

      // ── 각 스타일별 공격 실행 ──────────────────────
      function dealDamage(extra=0){
        if(shielded) return;
        const dmg = m.atk + extra;
        player.hp -= dmg;
        player.iframes = IFRAMES;
        spawnParticles(player.x,player.y,'#44aaff',5);
        screenShake = m.type==='boss'?22:14;
        addLog(`피격! -${dmg}HP`,'dmg');
        if(player.hp<=0){
          player.hp=0; player.alive=false;
          addLog('💀 전투 불능...','death');
          gameRunning=false;
          setTimeout(()=>showEnding(false),900);
        }
      }

      if(style==='fill_circle'){
        // 원형 전방위 폭발
        if(d < m.range) dealDamage();

      } else if(style==='fill_cross'){
        // 십자: 상하좌우 4개 직선 레이저 — 레이저 투사체 생성
        [-0, Math.PI/2, Math.PI, Math.PI*1.5].forEach(offset=>{
          const ang = m.aimAngle + offset;
          bullets.push({
            x:m.x, y:m.y,
            vx:Math.cos(ang)*12, vy:Math.sin(ang)*12,
            dist:0, angle:ang, alive:true,
            isMob:true, dmg:m.atk, col:m.col, len:28, w:5,
          });
        });

      } else if(style==='fill_cone'){
        // 원뿔: aim 각도 기준 ±45도 안에 있으면 피해
        const da = Math.atan2(dy,dx) - m.aimAngle;
        const nda = Math.atan2(Math.sin(da),Math.cos(da));
        if(d < m.range*1.1 && Math.abs(nda) < Math.PI/4) dealDamage(8);

      } else if(style==='fill_line'){
        // 레이저 직선: aim 각도로 긴 레이저 투사체 1발
        bullets.push({
          x:m.x, y:m.y,
          vx:Math.cos(m.aimAngle)*14, vy:Math.sin(m.aimAngle)*14,
          dist:0, angle:m.aimAngle, alive:true,
          isMob:true, dmg:m.atk, col:m.col, len:40, w:7, pierce:true,
        });

      } else if(style==='fill_ring'){
        // 링: 도넛 영역 피해 (range*0.5 ~ range*1.1)
        if(d > m.range*0.4 && d < m.range*1.15) dealDamage();

      } else if(style==='fill_scatter'){
        // 산탄: 8방향으로 총알 퍼뜨림
        for(let i=0;i<8;i++){
          const ang = m.aimAngle + (Math.PI*2/8)*i;
          bullets.push({
            x:m.x, y:m.y,
            vx:Math.cos(ang)*9, vy:Math.sin(ang)*9,
            dist:0, angle:ang, alive:true,
            isMob:true, dmg:m.atk, col:m.col, len:18, w:4,
          });
        }
      }
    }
  });

  // ── 몬스터 리스폰 ────────────────────────────────
  spawnTimer++;
  if(spawnTimer>260){
    spawnTimer=0;
    const normal=monsters.filter(m=>m.alive&&m.type!=='boss').length;
    if(normal<22) for(let i=0;i<4;i++) spawnMonster();
  }
  monsters=monsters.filter(m=>m.alive);

  // ── 쿨다운 감소 ──────────────────────────────────
  if(skillCd.bomb>0)    skillCd.bomb--;
  if(skillCd.shield>0)  skillCd.shield--;
  if(skillCd.thunder>0) skillCd.thunder--;
  if(shieldActive>0)    shieldActive--;

  // ── 아이템 픽업 ──────────────────────────────────
  items.forEach(it=>{
    it.life--; it.pulse++;
    if(!player.alive) return;
    if(Math.hypot(it.x-player.x,it.y-player.y)<22){
      it.life=0;
      if(it.type==='hp'){
        player.hp=Math.min(player.maxHp,player.hp+30);
        addLog('❤️ HP +30 회복','win');
      } else if(it.type==='bomb_charge'){
        skillCd.bomb=0;
        addLog('💣 폭탄 충전!','win');
      } else if(it.type==='shield_charge'){
        skillCd.shield=0;
        addLog('🛡 방패 충전!','win');
      } else if(it.type==='thunder_charge'){
        skillCd.thunder=0;
        addLog('⚡ 번개 충전!','win');
      } else if(it.type==='speed'){
        player.speedBoost=(player.speedBoost||0)+180;
        addLog('👟 속도 부스트 3초!','win');
      }
      spawnParticles(it.x,it.y,ITEM_COL[it.type],12);
    }
  });
  items=items.filter(it=>it.life>0);
  if(player.speedBoost>0) player.speedBoost--;

  // ── 폭탄 업데이트 ────────────────────────────────
  bombs.forEach(b=>{
    if(b.exploded){
      b.explodeTimer++;
      b.radius=b.maxRadius*(b.explodeTimer/20);
      if(b.explodeTimer>=20){ b.alive=false; return; }
      // 폭발 피해
      if(b.explodeTimer===5){
        monsters.forEach(m=>{
          if(!m.alive) return;
          if(Math.hypot(m.x-b.x,m.y-b.y)<b.maxRadius){
            m.hp-=80;
            spawnParticles(m.x,m.y,'#f84',8);
            if(m.hp<=0) killMonster(m);
          }
        });
        screenShake=25;
        dangerZonesFx.push({x:b.x,y:b.y,r:b.maxRadius,life:18,col:'#f84',type:'bomb'});
      }
    } else {
      b.x+=b.vx; b.y+=b.vy; b.dist+=5;
      if(b.dist>b.maxDist||isWall(b.x,b.y)) b.exploded=true;
    }
  });
  bombs=bombs.filter(b=>b.alive);
  dangerZonesFx.forEach(d=>d.life--);
  dangerZonesFx=dangerZonesFx.filter(d=>d.life>0);

  // ── 총알 업데이트 ────────────────────────────────
  bullets.forEach(b=>{
    if(!b.alive) return;
    const spd=Math.hypot(b.vx,b.vy);
    b.x+=b.vx; b.y+=b.vy; b.dist+=spd;
    const maxR = b.isMob ? (b.pierce?500:350) : BULLET_RANGE;
    if(b.dist>maxR||isWall(b.x,b.y)){ b.alive=false; return; }

    if(b.isMob){
      // 몬스터 투사체 → 플레이어 공격
      if(player.alive && shieldActive<=0 && player.iframes<=0){
        if(Math.hypot(player.x-b.x,player.y-b.y)<14){
          if(!b.pierce) b.alive=false;
          player.hp-=b.dmg;
          player.iframes=IFRAMES;
          spawnParticles(player.x,player.y,'#44aaff',5);
          screenShake=14;
          addLog(`투사체 피격! -${b.dmg}HP`,'dmg');
          if(player.hp<=0){
            player.hp=0; player.alive=false;
            addLog('💀 전투 불능...','death');
            gameRunning=false;
            setTimeout(()=>showEnding(false),900);
          }
        }
      }
    } else {
      // 플레이어 투사체 → 몬스터 공격
      monsters.forEach(m=>{
        if(!m.alive||!b.alive) return;
        if(Math.hypot(m.x-b.x,m.y-b.y)<m.size+4){
          b.alive=false;
          m.hp-=P_ATK;
          spawnParticles(m.x,m.y,m.col,6);
          if(m.hp<=0) killMonster(m);
        }
      });
    }
  });
  bullets=bullets.filter(b=>b.alive);

  // ── 파티클 ───────────────────────────────────────
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.88;p.vy*=0.88;p.life--;});
  particles=particles.filter(p=>p.life>0);
  attackFx.forEach(a=>a.life--);
  attackFx=attackFx.filter(a=>a.life>0);

  // ── 시야 업데이트 ────────────────────────────────
  updateFog();

  // ── 카메라 ───────────────────────────────────────
  const tx=player.x-canvas.width/2, ty=player.y-canvas.height/2;
  camX+=(tx-camX)*0.1; camY+=(ty-camY)*0.1;
  camX=Math.max(0,Math.min(MAP_W-canvas.width,camX));
  camY=Math.max(0,Math.min(MAP_H-canvas.height,camY));
  if(screenShake>0) screenShake--;

  // ── HUD (6프레임마다 DOM 업데이트) ─────────────────
  const boss=monsters.find(m=>m.type==='boss'&&m.alive);
  if(tick%6===0){
    const pct=Math.max(0,player.hp/player.maxHp*100);
    document.getElementById('hf0').style.width=pct+'%';
    document.getElementById('hn0').textContent=Math.max(0,player.hp)+' / '+player.maxHp;
    document.getElementById('s-kills').textContent=kills;
    const skillDefs=[
      {id:'sk0',cd:player.attackCd,max:P_CD},
      {id:'sk1',cd:skillCd.bomb,max:CD_BOMB},
      {id:'sk2',cd:skillCd.shield,max:CD_SHIELD},
      {id:'sk3',cd:skillCd.thunder,max:CD_THUNDER},
    ];
    skillDefs.forEach(s=>{
      const el=document.getElementById(s.id);
      const cdEl=document.getElementById(s.id+'cd');
      if(!el||!cdEl) return;
      el.className=s.cd<=0?'skill-slot ready':'skill-slot';
      cdEl.textContent=s.cd<=0?'준비':`${(s.cd/60).toFixed(1)}s`;
    });
    const sk2=document.getElementById('sk2');
    if(sk2&&shieldActive>0) sk2.className='skill-slot active';
    const itemCounts={};
    items.forEach(it=>{ itemCounts[it.type]=(itemCounts[it.type]||0)+1; });
    const itEl=document.getElementById('item-list');
    if(itEl){
      const entries=Object.entries(itemCounts);
      itEl.innerHTML=entries.length===0
        ?'<div class="it-row" style="color:#556">없음</div>'
        :entries.map(([t,n])=>`<div class="it-row">${ITEM_EMOJI[t]} x${n}</div>`).join('');
    }
  }
  if(boss){
    document.getElementById('boss-hp-fill').style.width=(boss.hp/boss.maxHp*100)+'%';
    document.getElementById('boss-title').textContent=
      (boss.enraged?'🔥 ':'👑 ')+'던전의 군주'+(boss.enraged?' [격노]':'');
  } else if(bossSpawned&&bossDefeated){
    document.getElementById('boss-bar').style.display='none';
  }
}

// ── Fog ─────────────────────────────────────────────
function updateFog(){
  if(!player.alive) return;
  const r=Math.ceil(SIGHT_R/TILE)+1;
  const cx=player.x/TILE|0, cy=player.y/TILE|0;
  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      if(dx*dx*TILE*TILE+dy*dy*TILE*TILE>(SIGHT_R+TILE)*(SIGHT_R+TILE)) continue;
      const c=cx+dx, rr=cy+dy;
      if(c>=0&&c<COLS&&rr>=0&&rr<ROWS) explored[rr*COLS+c]=1;
    }
  }
}

// ═══════════════════════════════════════════════════════
//  렌더
// ═══════════════════════════════════════════════════════
// 타일 색상
const floorColor='#111228', wallColor='#1e2040', wallTop='#252848';
const bossFloor='#1e0808', dimFloor='#0a0a18', dimWall='#0d0e1e';

// ── 타일맵 오프스크린 캐시 ──────────────────────────
// 맵 전체를 하나의 큰 오프스크린 캔버스에 그려두고
// 화면에 보이는 영역만 drawImage로 잘라서 그림
// explored/inSight는 fog로 처리하므로 여기선 전체 타일만 캐시
let _tileCanvas=null, _tileCtx=null, _tilesDirty=true;
let _mmCanvas=null, _mmCtx2=null, _mmDirty=true;
let _exploredVersion=0, _lastExploredVersion=-1;

function _rebuildTileCache(){
  if(!_tileCanvas){
    _tileCanvas=document.createElement('canvas');
    _tileCanvas.width=MAP_W; _tileCanvas.height=MAP_H;
    _tileCtx=_tileCanvas.getContext('2d');
  }
  const tc=_tileCtx, ts=TILE;
  tc.fillStyle='#050810'; tc.fillRect(0,0,MAP_W,MAP_H);
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const idx=r*COLS+c;
      if(!explored[idx]) continue;
      const wx=c*ts, wy=r*ts;
      const t=tiles[idx];
      const inBoss=bossArena&&wx>=bossArena.x-ts&&wx<bossArena.x+bossArena.w+ts
                &&wy>=bossArena.y-ts&&wy<bossArena.y+bossArena.h+ts;
      if(t===1){
        tc.fillStyle=wallColor;  tc.fillRect(wx,wy,ts,ts);
        tc.fillStyle=wallTop;    tc.fillRect(wx+2,wy+2,ts-4,ts-4);
        tc.fillStyle='#2a305a';  tc.fillRect(wx+2,wy+2,ts-4,3);
        tc.fillStyle='#2a305a';  tc.fillRect(wx+2,wy+2,3,ts-4);
      } else {
        tc.fillStyle=inBoss?bossFloor:floorColor; tc.fillRect(wx,wy,ts,ts);
        tc.strokeStyle=inBoss?'#2a1010':'#151530';
        tc.lineWidth=.5; tc.strokeRect(wx,wy,ts,ts);
      }
    }
  }
  _tilesDirty=false;
}

// updateFog 호출 후 dirty 마크
const _origUpdateFog=()=>{
  if(!player.alive) return;
  const r=Math.ceil(SIGHT_R/TILE)+1;
  const cx=player.x/TILE|0, cy=player.y/TILE|0;
  let changed=false;
  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      if(dx*dx*TILE*TILE+dy*dy*TILE*TILE>(SIGHT_R+TILE)*(SIGHT_R+TILE)) continue;
      const c=cx+dx, rr=cy+dy;
      if(c>=0&&c<COLS&&rr>=0&&rr<ROWS&&!explored[rr*COLS+c]){
        explored[rr*COLS+c]=1; changed=true;
      }
    }
  }
  if(changed) _tilesDirty=true;
};

function draw(){
  const W=canvas.width, H=canvas.height;
  const shX=screenShake>0?(Math.random()-.5)*screenShake*.3:0;
  const shY=screenShake>0?(Math.random()-.5)*screenShake*.3:0;

  ctx.save();
  ctx.translate(shX,shY);
  ctx.clearRect(-10,-10,W+20,H+20);
  ctx.fillStyle='#050810'; ctx.fillRect(-10,-10,W+20,H+20);

  // ── 타일 (오프스크린 캐시 → drawImage 1회) ────────
  const px=player.x, py=player.y, sr2=SIGHT_R*SIGHT_R;
  if(_tilesDirty) _rebuildTileCache();
  // 탐험된 타일 전체를 한 번에
  if(_tileCanvas){
    ctx.drawImage(_tileCanvas, camX|0, camY|0, W, H, 0, 0, W, H);
  }
  // 미탐험 영역은 fog가 덮으므로 별도 처리 불필요

  // ── 보스 방 테두리 ────────────────────────────────
  {
    const ba=bossArena;
    const ddx=ba.x+ba.w/2-px, ddy=ba.y+ba.h/2-py;
    const visible=ddx*ddx+ddy*ddy<(SIGHT_R+300)*(SIGHT_R+300);
    const bExplored=explored[(Math.floor(ba.y/TILE))*COLS+Math.floor(ba.x/TILE)];
    if(visible&&bExplored){
      ctx.save();
      const pulse=.55+.45*Math.sin(tick*.04);
      ctx.globalAlpha=pulse*.8;
      ctx.strokeStyle='#f40'; ctx.lineWidth=3;
      ctx.setLineDash([9,7]);
      ctx.strokeRect(ba.x-camX,ba.y-camY,ba.w,ba.h);
      ctx.globalAlpha=.04*pulse;
      ctx.fillStyle='#ff4400';
      ctx.fillRect(ba.x-camX,ba.y-camY,ba.w,ba.h);
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // ── 위험 범위 — 패턴별 시각화 (채워지면 그 모양으로 공격) ──
  monsters.forEach(m=>{
    if(!m.alive||!m.warnPhase) return;
    const sx=m.x-camX, sy=m.y-camY;
    const ddx=m.x-px, ddy=m.y-py;
    if(ddx*ddx+ddy*ddy>(SIGHT_R+m.range+60)*(SIGHT_R+m.range+60)) return;

    const ratio = 1 - m.attackCd/m.warn;  // 0→1
    const r2=ratio*ratio;
    const red = Math.min(255, 60+195*r2|0);
    const grn = Math.min(255, 230-200*r2|0);
    const fillC = `rgb(${red},${grn},20)`;  // 초록→노랑→빨강 (fc와 다른 이름 — fog ctx 충돌 방지)
    const style = m.attackStyle||'fill_circle';
    const ang = m.aimAngle||0;
    ctx.save();

    // ── fill_circle: 원이 안에서 밖으로 채워짐 ──────
    if(style==='fill_circle'){
      // 외곽 테두리 (고정)
      ctx.globalAlpha=0.45; ctx.strokeStyle='#663';
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(sx,sy,m.range,0,Math.PI*2); ctx.stroke();
      // 채워지는 원 (작은→큰)
      const fillR = m.range * ratio;
      ctx.globalAlpha=0.18+ratio*0.22;
      ctx.fillStyle=fillC;
      ctx.beginPath(); ctx.arc(sx,sy,fillR,0,Math.PI*2); ctx.fill();
      // 테두리 원
      ctx.globalAlpha=0.5+ratio*0.45;
      ctx.strokeStyle=fillC; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(sx,sy,fillR,0,Math.PI*2); ctx.stroke();
    }

    // ── fill_cross: 십자 4방향 바가 뻗어나옴 ────────
    else if(style==='fill_cross'){
      const arm = m.range * ratio;
      const thick = 18+ratio*10;
      ctx.globalAlpha=0.12+ratio*0.22;
      ctx.fillStyle=fillC;
      // 십자 4방향 막대 (ang 기준 회전)
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(ang);
      ctx.fillRect(-arm,-thick/2,arm*2,thick);
      ctx.fillRect(-thick/2,-arm,thick,arm*2);
      ctx.restore();
      // 외곽 십자 테두리 (최대 범위)
      ctx.globalAlpha=0.35+ratio*0.5;
      ctx.strokeStyle=fillC; ctx.lineWidth=2;
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(ang);
      ctx.strokeRect(-m.range,-thick/2*1.2,m.range*2,thick*1.2);
      ctx.strokeRect(-thick/2*1.2,-m.range,thick*1.2,m.range*2);
      ctx.restore();
    }

    // ── fill_cone: 원뿔(쐐기)이 ratio만큼 채워짐 ────
    else if(style==='fill_cone'){
      const coneAngle = Math.PI/4; // 45도 반각 → 90도 원뿔
      // 최대 범위 윤곽
      ctx.globalAlpha=0.35;
      ctx.strokeStyle='#663'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.arc(sx,sy,m.range*1.1,ang-coneAngle,ang+coneAngle);
      ctx.closePath(); ctx.stroke();
      // 채워지는 원뿔
      const coneR = m.range * ratio;
      ctx.globalAlpha=0.18+ratio*0.28;
      ctx.fillStyle=fillC;
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.arc(sx,sy,coneR,ang-coneAngle,ang+coneAngle);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha=0.45+ratio*0.5;
      ctx.strokeStyle=fillC; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.arc(sx,sy,coneR,ang-coneAngle,ang+coneAngle);
      ctx.closePath(); ctx.stroke();
    }

    // ── fill_line: 직선 바가 ratio만큼 뻗어나옴 ─────
    else if(style==='fill_line'){
      const maxLen = m.range*1.8;
      const lineLen = maxLen * ratio;
      const thick = 22;
      // 최대 범위 외곽
      ctx.globalAlpha=0.3; ctx.strokeStyle='#446';
      ctx.lineWidth=1.5;
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(ang);
      ctx.strokeRect(0,-thick/2,maxLen,thick);
      ctx.restore();
      // 채워지는 막대
      ctx.globalAlpha=0.15+ratio*0.25;
      ctx.fillStyle=fillC;
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(ang);
      ctx.fillRect(0,-thick/2,lineLen,thick);
      ctx.restore();
      // 테두리 막대
      ctx.globalAlpha=0.5+ratio*0.45;
      ctx.strokeStyle=fillC; ctx.lineWidth=2.5;
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(ang);
      ctx.strokeRect(0,-thick/2,lineLen,thick);
      ctx.restore();
    }

    // ── fill_ring: 바깥 링이 안으로 수축 ─────────────
    else if(style==='fill_ring'){
      const outerR = m.range * 1.2;
      const innerR = outerR * (1 - ratio * 0.6); // 수축
      // 외곽 고정
      ctx.globalAlpha=0.35; ctx.strokeStyle='#663';
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(sx,sy,outerR,0,Math.PI*2); ctx.stroke();
      // 수축하는 링 도넛
      ctx.globalAlpha=0.15+ratio*0.28;
      ctx.fillStyle=fillC;
      ctx.beginPath();
      ctx.arc(sx,sy,outerR,0,Math.PI*2,false);
      ctx.arc(sx,sy,innerR,0,Math.PI*2,true);
      ctx.fill();
      ctx.globalAlpha=0.5+ratio*0.45;
      ctx.strokeStyle=fillC; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(sx,sy,innerR,0,Math.PI*2); ctx.stroke();
    }

    // ── fill_scatter: 원 안에서 방사형 화살표들이 퍼짐 ─
    else if(style==='fill_scatter'){
      // 배경 원
      ctx.globalAlpha=0.3; ctx.strokeStyle='#663';
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(sx,sy,m.range,0,Math.PI*2); ctx.stroke();
      // 8방향 화살표 선 (ratio만큼 길어짐)
      ctx.globalAlpha=0.55+ratio*0.4;
      ctx.strokeStyle=fillC; ctx.lineWidth=2; ctx.lineCap='round';
      for(let i=0;i<8;i++){
        const a = ang + (Math.PI*2/8)*i;
        const alen = m.range*0.85*ratio;
        const ex = sx+Math.cos(a)*alen, ey=sy+Math.sin(a)*alen;
        ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
        // 화살 머리
        if(ratio>0.5){
          const ha=0.4;
          ctx.beginPath();
          ctx.moveTo(ex,ey);
          ctx.lineTo(ex-Math.cos(a-ha)*10,ey-Math.sin(a-ha)*10);
          ctx.moveTo(ex,ey);
          ctx.lineTo(ex-Math.cos(a+ha)*10,ey-Math.sin(a+ha)*10);
          ctx.stroke();
        }
      }
    }

    // 경고 아이콘 (마지막 20%)
    if(ratio>0.8){
      const alertRatio=(ratio-0.8)/0.2;
      ctx.globalAlpha=alertRatio;
      ctx.fillStyle='#fff';
      ctx.font=`bold ${(12+ratio*5)|0}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⚠', sx, sy - m.range - 12);
    }
    ctx.restore();
  });

  // ── 총알 렌더링 ──────────────────────────────────
  bullets.forEach(b=>{
    const sx=b.x-camX, sy=b.y-camY;
    const blen = b.len||BULLET_LEN;
    const tailX=sx-Math.cos(b.angle)*blen;
    const tailY=sy-Math.sin(b.angle)*blen;
    ctx.save();
    if(b.isMob){
      // 몬스터 투사체: 붉은/주황 색
      const mc = b.col||'#f44';
      ctx.shadowColor=mc; ctx.shadowBlur=12;
      const grad=ctx.createLinearGradient(tailX,tailY,sx,sy);
      grad.addColorStop(0,'rgba(0,0,0,0)');
      grad.addColorStop(0.3,mc);   // hex+aa 는 잘못된 색상 → 그냥 mc 사용
      grad.addColorStop(1,mc);
      ctx.strokeStyle=grad;
      ctx.lineWidth=b.w||4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(tailX,tailY); ctx.lineTo(sx,sy); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.shadowBlur=18;
      ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill();
    } else {
      // 플레이어 투사체: 파란색
      ctx.shadowColor='#88ddff'; ctx.shadowBlur=10;
      const grad=ctx.createLinearGradient(tailX,tailY,sx,sy);
      grad.addColorStop(0,'rgba(68,170,255,0)');
      grad.addColorStop(0.4,'rgba(100,200,255,0.7)');
      grad.addColorStop(1,'rgba(220,240,255,1)');
      ctx.strokeStyle=grad;
      ctx.lineWidth=3.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(tailX,tailY); ctx.lineTo(sx,sy); ctx.stroke();
      ctx.shadowBlur=16; ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });

  // ── 몬스터 ───────────────────────────────────────
  monsters.forEach(m=>{
    if(!m.alive) return;
    const ddx=m.x-px, ddy=m.y-py;
    if(ddx*ddx+ddy*ddy>sr2*2.5) return;
    const sx=m.x-camX, sy=m.y-camY;
    const sp=SP_MAP[m.type];
    const sc=m.type==='boss'?3:2;
    const spH=sp?sp.length*sc:m.size*2;
    const spW=sp?sp[0].length*sc:m.size*2;
    ctx.save();
    // 글로우 (경고/격노)
    if(m.warnPhase||m.enraged){
      ctx.shadowColor=m.enraged?'#f60':m.type==='boss'?'#f80':'#f44';
      ctx.shadowBlur=m.enraged?24:16;
    }
    // 스프라이트
    drawMonsterSprite(ctx, m, sx, sy);
    ctx.shadowBlur=0;
    // HP 바
    const bw=Math.max(spW, 36);
    ctx.fillStyle='#000a'; ctx.fillRect(sx-bw/2-1, sy-spH/2-14, bw+2, 7);
    ctx.fillStyle='#e44'; ctx.fillRect(sx-bw/2, sy-spH/2-13, bw*(m.hp/m.maxHp), 5);
    // 보스 이름
    if(m.type==='boss'){
      ctx.fillStyle=m.enraged?'#f96':'#fda';
      ctx.font='bold 12px Noto Sans KR';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(m.enraged?'🔥 격노한 던전의 군주':'👑 던전의 군주', sx, sy-spH/2-18);
    }
    ctx.restore();
  });

  // ── 폭탄 렌더 ────────────────────────────────────
  bombs.forEach(b=>{
    const sx=b.x-camX, sy=b.y-camY;
    ctx.save();
    if(b.exploded){
      const t=b.explodeTimer/20;
      ctx.globalAlpha=(1-t)*0.7;
      ctx.fillStyle='#f84';
      ctx.beginPath(); ctx.arc(sx,sy,b.radius,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#ff0'; ctx.lineWidth=3; ctx.globalAlpha=(1-t)*0.9;
      ctx.beginPath(); ctx.arc(sx,sy,b.radius,0,Math.PI*2); ctx.stroke();
    } else {
      ctx.shadowColor='#f84'; ctx.shadowBlur=12;
      ctx.fillStyle='#f84';
      const pulse=0.8+0.2*Math.sin(tick*0.3);
      ctx.beginPath(); ctx.arc(sx,sy,8*pulse,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ff0';
      ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });

  // ── 스킬 이펙트 FX ───────────────────────────────
  dangerZonesFx.forEach(d=>{
    const sx=d.x-camX, sy=d.y-camY;
    const t=d.life/(d.type==='thunder'?25:18);
    ctx.save();
    ctx.globalAlpha=t*0.35;
    ctx.fillStyle=d.col;
    ctx.beginPath(); ctx.arc(sx,sy,d.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=t*0.8;
    ctx.strokeStyle=d.col; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(sx,sy,d.r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  });

  // ── 아이템 렌더 ─────────────────────────────────
  items.forEach(it=>{
    const ddx=it.x-player.x, ddy=it.y-player.y;
    if(ddx*ddx+ddy*ddy>SIGHT_R*SIGHT_R*1.2) return;
    const sx=it.x-camX, sy=it.y-camY;
    const pulse=0.85+0.15*Math.sin(it.pulse*0.1);
    ctx.save();
    ctx.globalAlpha=0.9;
    ctx.shadowColor=ITEM_COL[it.type]; ctx.shadowBlur=14;
    ctx.fillStyle=ITEM_COL[it.type];
    ctx.beginPath(); ctx.arc(sx,sy,10*pulse,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.font='12px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ITEM_EMOJI[it.type],sx,sy);
    ctx.restore();
  });

  // ── Fog of War — 오프스크린 → drawImage ─────────────
  {
    const psx=player.x-camX|0, psy=player.y-camY|0;
    if(!window._fog||window._fog.width!==W||window._fog.height!==H){
      window._fog=document.createElement('canvas');
      window._fog.width=W; window._fog.height=H;
      window._fogC=window._fog.getContext('2d');
    }
    const fc2=window._fogC;
    fc2.clearRect(0,0,W,H);
    fc2.fillStyle='rgba(5,8,16,0.93)'; fc2.fillRect(0,0,W,H);
    fc2.globalCompositeOperation='destination-out';
    const fg=fc2.createRadialGradient(psx,psy,SIGHT_R*0.35,psx,psy,SIGHT_R);
    fg.addColorStop(0,'rgba(0,0,0,1)');
    fg.addColorStop(0.6,'rgba(0,0,0,0.92)');
    fg.addColorStop(1,'rgba(0,0,0,0)');
    fc2.fillStyle=fg;
    fc2.beginPath(); fc2.arc(psx,psy,SIGHT_R,0,Math.PI*2); fc2.fill();
    fc2.globalCompositeOperation='source-over';
    ctx.drawImage(window._fog,0,0);
  }

  // ── 파티클 (fog 위) ───────────────────────────────
  particles.forEach(p=>{
    const ddx=p.x-player.x, ddy=p.y-player.y;
    if(ddx*ddx+ddy*ddy>SIGHT_R*SIGHT_R*1.1) return;
    ctx.save();
    ctx.globalAlpha=p.life/40;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y-camY,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // ── 플레이어 (fog 위 → 항상 보임) ────────────────
  {
    const sx=player.x-camX, sy=player.y-camY;
    ctx.save();
    const blinking=player.iframes>0&&Math.floor(tick/4)%2===0;

    // 그림자
    ctx.fillStyle='rgba(0,100,255,0.18)';
    ctx.beginPath(); ctx.ellipse(sx, sy+20, 14, 5, 0, 0, Math.PI*2); ctx.fill();

    // 방패 링
    if(shieldActive>0){
      const sp=0.8+0.2*Math.sin(tick*0.2);
      ctx.globalAlpha=0.55*sp;
      ctx.strokeStyle='#88eeff'; ctx.lineWidth=4;
      ctx.shadowColor='#88eeff'; ctx.shadowBlur=14;
      ctx.beginPath(); ctx.arc(sx,sy,26,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=0.13*sp;
      ctx.fillStyle='#88eeff';
      ctx.beginPath(); ctx.arc(sx,sy,26,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }

    // 속도부스트 잔상
    if(player.speedBoost>0){
      ctx.globalAlpha=0.25;
      drawPlayerSprite(ctx, sx-4, sy+2, player.facing, false, player.alive);
      ctx.globalAlpha=1;
    }

    // 플레이어 스프라이트
    ctx.globalAlpha=!player.alive?0.3:blinking?0.45:1;
    if(!blinking){
      ctx.shadowColor='#4af'; ctx.shadowBlur=10;
    }
    drawPlayerSprite(ctx, sx, sy, player.facing, blinking, player.alive);
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;

    // 이름
    ctx.fillStyle='#aaddff'; ctx.font='bold 10px Noto Sans KR';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('용사 ★', sx, sy - 22);

    // HP 바
    const bw=36;
    ctx.fillStyle='#000a'; ctx.fillRect(sx-bw/2-1, sy-21, bw+2, 6);
    ctx.fillStyle='#44aaff'; ctx.fillRect(sx-bw/2, sy-20, bw*(Math.max(0,player.hp)/player.maxHp), 4);

  // ── 미니맵 ───────────────────────────────────────
  drawMinimap();
}


// ═══════════════════════════════════════════════════════
//  픽셀아트 스프라이트 그리기 함수들
//  drawSprite(ctx, pixels, x, y, scale, flipX)
//  pixels: [row][col] = '#rrggbb' | 'transparent'
// ═══════════════════════════════════════════════════════
// 스프라이트 캐시: key=`type_scale_flip` → ImageBitmap (또는 캔버스)
const _spriteCache={};

function _renderToCache(pixels, scale, flipX){
  const rows=pixels.length, cols=pixels[0].length;
  const oc=document.createElement('canvas');
  oc.width=cols*scale; oc.height=rows*scale;
  const oc2=oc.getContext('2d');
  for(let r=0;r<rows;r++){
    for(let col=0;col<cols;col++){
      const pix=pixels[r][col];
      if(!pix||pix==='.'||pix==='x') continue;
      const dc=flipX?cols-1-col:col;
      oc2.fillStyle=pix;
      oc2.fillRect(dc*scale,r*scale,scale,scale);
    }
  }
  return oc; // HTMLCanvasElement — drawImage 가능
}

function drawSprite(c, pixels, cx, cy, scale, flipX=false){
  const key=pixels._cacheKey+(flipX?'_f':'_n')+scale;
  if(!_spriteCache[key]) _spriteCache[key]=_renderToCache(pixels,scale,flipX);
  const img=_spriteCache[key];
  c.drawImage(img, cx-img.width/2|0, cy-img.height/2|0);
}

function drawMonsterSprite(c, m, sx, sy){
  const sp = SP_MAP[m.type];
  if(!sp) return;
  const scale = m.type==='boss' ? 3 : 2;
  // 이동 방향에 따라 flipX
  const flip = m.aimAngle!==undefined && Math.cos(m.aimAngle||0)<0;
  // 피격 시 붉은 틴트
  if(m.warnPhase||m.enraged){
    c.save();
    c.globalAlpha=0.3+0.2*Math.sin(Date.now()*0.01);
    c.fillStyle=m.enraged?'#ff6600':'#ff2200';
    c.fillRect(sx - (sp[0].length*scale)/2 - 2, sy - (sp.length*scale)/2 - 2,
               sp[0].length*scale+4, sp.length*scale+4);
    c.restore();
  }
  drawSprite(c, sp, sx, sy, scale, flip);
}

function drawPlayerSprite(c, sx, sy, facing, blinking, alive){
  if(!alive){ c.globalAlpha=0.3; }
  else if(blinking){ c.globalAlpha=0.5; }
  else { c.globalAlpha=1; }
  const flip = Math.cos(facing||0) < 0;
  drawSprite(c, SP_PLAYER, sx, sy, 2, flip);
  c.globalAlpha=1;
}

function drawMinimap(){
  const mW=mmCv.width, mH=mmCv.height;
  const scX=mW/MAP_W, scY=mH/MAP_H;

  // 탐험 변경 시에만 오프스크린 재렌더
  if(_tilesDirty||!_mmCanvas){
    if(!_mmCanvas){
      _mmCanvas=document.createElement('canvas');
      _mmCanvas.width=mW; _mmCanvas.height=mH;
      _mmCtx2=_mmCanvas.getContext('2d');
    }
    _mmCtx2.fillStyle='#05080f'; _mmCtx2.fillRect(0,0,mW,mH);
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        if(!explored[r*COLS+c]) continue;
        _mmCtx2.fillStyle=tiles[r*COLS+c]===1?'#2a2d50':'#191c36';
        _mmCtx2.fillRect(c*TILE*scX|0,r*TILE*scY|0,Math.ceil(TILE*scX+.5),Math.ceil(TILE*scY+.5));
      }
    }
  }
  mmCtx.clearRect(0,0,mW,mH);
  if(_mmCanvas) mmCtx.drawImage(_mmCanvas,0,0);

  // 보스 방 펄스
  const bExp=explored[Math.floor(bossArena.y/TILE)*COLS+Math.floor(bossArena.x/TILE)];
  if(bExp){
    const pulse=.5+.5*Math.sin(tick*.04);
    mmCtx.strokeStyle=`rgba(255,68,0,${pulse})`; mmCtx.lineWidth=1.5;
    mmCtx.strokeRect(bossArena.x*scX,bossArena.y*scY,bossArena.w*scX,bossArena.h*scY);
  }
  // 플레이어 점
  mmCtx.fillStyle='#fff';
  mmCtx.beginPath(); mmCtx.arc(player.x*scX,player.y*scY,3.5,0,Math.PI*2); mmCtx.fill();
  // 뷰포트
  mmCtx.strokeStyle='#ffffff22'; mmCtx.lineWidth=1;
  mmCtx.strokeRect(camX*scX,camY*scY,canvas.width*scX,canvas.height*scY);
}

let rafId=null;
let lastT=0, accumT=0;
const FIXED_DT=1000/60; // 고정 60fps 업데이트

function loop(t=0){
  rafId=requestAnimationFrame(loop);
  const dt=Math.min(t-lastT, 100); // 최대 100ms (탭 복귀 시 스파이크 방지)
  lastT=t;

  if(multiMode){
    draw();
    return;
  }

  // 고정 타임스텝 누적
  accumT+=dt;
  let steps=0;
  while(accumT>=FIXED_DT && steps<3){ // 최대 3스텝 (렉 스파이크 방지)
    update();
    accumT-=FIXED_DT;
    steps++;
  }
  draw();
}

function setMultiStatus(msg){ document.getElementById('multi-status').textContent=msg; }

function connectMulti(url){
  currentServerUrl=url;
  setMultiStatus('접속 중...');
  if(multiWs){ try{multiWs.close();}catch(e){} }

  multiWs=new WebSocket(url);

  multiWs.onopen=()=>setMultiStatus('연결됨! 대기중...');
  multiWs.onerror=()=>setMultiStatus('❌ 연결 실패. URL을 확인해주세요.');
  multiWs.onclose=()=>{
    if(multiMode) setMultiStatus('연결 끊김');
    multiMode=false;
  };

  multiWs.onmessage=(e)=>{
    const msg=JSON.parse(e.data);

    if(msg.type==='full'){
      setMultiStatus('❌ 방이 가득 찼습니다 (최대 3인)');
      multiWs.close(); return;
    }

    if(msg.type==='init'){
      myMultiId=msg.pid;
      myColorIdx=msg.colorIdx;
      multiMode=true;

      // 멀티용 맵 타일 설정
      tiles=new Uint8Array(msg.tiles);
      explored=new Uint8Array(COLS*ROWS);
      mapW=msg.mapW; mapH=msg.mapH;
      bossArena=msg.bossArena;

      document.getElementById('lobby').style.display='none';
      document.getElementById('game').style.display='block';
      document.getElementById('ending').style.display='none';
      setMultiStatus(`접속 완료! (${msg.name})`);

      // HUD 업데이트
      updateMultiHUD([]);
      if(!rafId) loop();
      return;
    }

    if(msg.type==='state'){
      multiState=msg;
      // fog 업데이트
      msg.players.forEach(p=>{
        if(!explored) return;
        const r=Math.ceil(SIGHT_R/TILE)+1;
        const cx=p.x/TILE|0, cy=p.y/TILE|0;
        for(let dy=-r;dy<=r;dy++) for(let dx=-r;dx<=r;dx++){
          const c=cx+dx,rr=cy+dy;
          if(c>=0&&c<COLS&&rr>=0&&rr<ROWS) explored[rr*COLS+c]=1;
        }
      });
      updateMultiHUD(msg.players);
      return;
    }

    if(msg.type==='boss_spawn') showAlert('👑 보스 등장!');
    if(msg.type==='game_won') showEnding(true);
    if(msg.type==='game_over') showEnding(false);

    if(msg.type==='player_join') addLog(`✅ ${msg.name} 입장 (${msg.count}/3명)`);
    if(msg.type==='player_leave') addLog(`🚪 ${msg.name} 퇴장 (${msg.count}/3명)`);

    if(msg.type==='attack_fx'){
      attackFx.push({x:msg.x,y:msg.y,r:68,life:14,pid:msg.pid});
    }
    if(msg.type==='thunder_fx'){
      dangerZonesFx.push({x:msg.x,y:msg.y,r:msg.r,life:25,col:'#aaf',type:'thunder'});
    }
  };
}

function updateMultiHUD(players){
  if(!players||!players.length) return;
  const cards=document.getElementById('p-cards')||document.querySelector('#hud');
  // 모든 플레이어 카드
  const pcardsEl=document.getElementById('p-cards');
  if(!pcardsEl) return;
  pcardsEl.innerHTML='';
  players.forEach((p,i)=>{
    const col=PCOLORS[p.colorIdx]||PCOLORS[0];
    const pct=Math.max(0,p.hp/p.maxHp*100);
    const isMe=p.id===myMultiId;
    pcardsEl.innerHTML+=`
      <div class="p-card${p.alive?'':' dead'}">
        <div class="p-name">
          <span class="p-dot" style="background:${col}"></span>
          ${p.name}${isMe?' ★':''}${p.alive?'':'💀'}
        </div>
        <div class="hp-track"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="hp-num">${p.alive?p.hp+'/'+p.maxHp:'전투불능'}</div>
      </div>`;
  });
  // 본인 스킬 쿨다운
  const me=players.find(p=>p.id===myMultiId);
  if(me){
    const skillDefs=[
      {id:'sk0',cd:me.attackCd,max:P_CD},
      {id:'sk1',cd:me.skillCd?.bomb||0,max:CD_BOMB},
      {id:'sk2',cd:me.skillCd?.shield||0,max:CD_SHIELD},
      {id:'sk3',cd:me.skillCd?.thunder||0,max:CD_THUNDER},
    ];
    skillDefs.forEach(s=>{
      const el=document.getElementById(s.id);
      const cdEl=document.getElementById(s.id+'cd');
      if(!el||!cdEl) return;
      el.className=s.cd<=0?'skill-slot ready':'skill-slot';
      cdEl.textContent=s.cd<=0?'준비':`${(s.cd/60).toFixed(1)}s`;
    });
    // 보스 HP
    const boss=multiState?.monsters?.find(m=>m.type==='boss'&&m.alive);
    if(boss){
      document.getElementById('boss-bar').style.display='block';
      document.getElementById('boss-hp-fill').style.width=(boss.hp/boss.maxHp*100)+'%';
      document.getElementById('boss-title').textContent=
        (boss.enraged?'🔥 ':'👑 ')+'던전의 군주'+(boss.enraged?' [격노]':'');
    } else {
      document.getElementById('boss-bar').style.display='none';
    }
    document.getElementById('s-kills').textContent=multiState?.kills||0;
  }
}

const _origUpdate=update;
const _origDraw=draw;

// update/draw 를 멀티 모드일 때 서버 상태로 대체
const PCOLORS=['#44aaff','#ff8844','#aa44ff'];
function multiDraw(){
  if(!multiState) return;
  const W=canvas.width, H=canvas.height;
  // 내 위치로 카메라
  const me=multiState.players.find(p=>p.id===myMultiId);
  if(me){
    const tx=me.x-W/2, ty=me.y-H/2;
    camX+=(tx-camX)*0.1; camY+=(ty-camY)*0.1;
    camX=Math.max(0,Math.min(MAP_W-W,camX));
    camY=Math.max(0,Math.min(MAP_H-H,camY));
  }
  if(screenShake>0) screenShake--;

  ctx.save();
  const shX=screenShake>0?(Math.random()-.5)*screenShake*.3:0;
  const shY=screenShake>0?(Math.random()-.5)*screenShake*.3:0;
  ctx.translate(shX,shY);
  ctx.clearRect(-10,-10,W+20,H+20);
  ctx.fillStyle='#050810'; ctx.fillRect(-10,-10,W+20,H+20);

  // 타일
  const ts=TILE;
  const c0=Math.max(0,(camX/ts)|0)-1, c1=Math.min(COLS,((camX+W)/ts|0)+2);
  const r0=Math.max(0,(camY/ts)|0)-1, r1=Math.min(ROWS,((camY+H)/ts|0)+2);
  const allPx=multiState.players.filter(p=>p.alive);
  for(let r=r0;r<r1;r++){
    for(let c=c0;c<c1;c++){
      if(!explored[r*COLS+c]) continue;
      const wx=c*ts,wy=r*ts;
      const inSight=allPx.some(p=>Math.hypot(wx+ts/2-p.x,wy+ts/2-p.y)<SIGHT_R*1.05);
      const sx2=wx-camX|0,sy2=wy-camY|0;
      const t=tiles[r*COLS+c];
      if(inSight){
        const inBoss=bossArena&&wx>=bossArena.x-ts&&wx<bossArena.x+bossArena.w+ts&&wy>=bossArena.y-ts&&wy<bossArena.y+bossArena.h+ts;
        if(t===1){
          ctx.fillStyle='#1e2040';ctx.fillRect(sx2,sy2,ts,ts);
          ctx.fillStyle='#252848';ctx.fillRect(sx2+2,sy2+2,ts-4,ts-4);
        } else {
          ctx.fillStyle=inBoss?'#1e0808':'#111228';ctx.fillRect(sx2,sy2,ts,ts);
          ctx.strokeStyle=inBoss?'#2a1010':'#151530';ctx.lineWidth=.5;ctx.strokeRect(sx2,sy2,ts,ts);
        }
      } else {
        ctx.fillStyle=t===1?'#0e0f20':'#0a0a18';ctx.fillRect(sx2,sy2,ts,ts);
      }
    }
  }

  // 보스 방 테두리
  if(bossArena){
    const bExp=explored&&explored[Math.floor(bossArena.y/TILE)*COLS+Math.floor(bossArena.x/TILE)];
    if(bExp){
      const pulse=.55+.45*Math.sin(tick*.04);
      ctx.save(); ctx.globalAlpha=pulse*.8; ctx.strokeStyle='#f40'; ctx.lineWidth=3;
      ctx.setLineDash([9,7]); ctx.strokeRect(bossArena.x-camX,bossArena.y-camY,bossArena.w,bossArena.h);
      ctx.setLineDash([]); ctx.restore();
    }
  }

  // 위험범위 렌더 (싱글과 동일 로직 — monsters 임시 교체)
  const _savedMonsters=monsters;
  monsters=multiState.monsters||[];
  const _savedPx=px,_savedPy=py;
  if(me){window._mpx=me.x;window._mpy=me.y;}
  // drawDangerZones 인라인
  monsters.forEach(m=>{
    if(!m.alive||!m.warnPhase) return;
    const sxm=m.x-camX,sym=m.y-camY;
    const ddx=m.x-(me?me.x:0),ddy=m.y-(me?me.y:0);
    if(ddx*ddx+ddy*ddy>(SIGHT_R+m.range+60)*(SIGHT_R+m.range+60)) return;
    const ratio=1-m.attackCd/m.warn;
    const r2=ratio*ratio;
    const red=Math.min(255,60+195*r2|0),grn=Math.min(255,230-200*r2|0);
    const fillC=`rgb(${red},${grn},20)`;
    const style=m.attackStyle||'fill_circle';
    const ang=m.aimAngle||0;
    ctx.save();
    if(style==='fill_circle'){
      ctx.globalAlpha=0.45;ctx.strokeStyle='#663';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(sxm,sym,m.range,0,Math.PI*2);ctx.stroke();
      const fillR=m.range*ratio;
      ctx.globalAlpha=0.18+ratio*0.22;ctx.fillStyle=fillC;
      ctx.beginPath();ctx.arc(sxm,sym,fillR,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.5+ratio*0.45;ctx.strokeStyle=fillC;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(sxm,sym,fillR,0,Math.PI*2);ctx.stroke();
    } else if(style==='fill_cross'){
      const arm=m.range*ratio,thick=18+ratio*10;
      ctx.globalAlpha=0.12+ratio*0.22;ctx.fillStyle=fillC;
      ctx.save();ctx.translate(sxm,sym);ctx.rotate(ang);
      ctx.fillRect(-arm,-thick/2,arm*2,thick);ctx.fillRect(-thick/2,-arm,thick,arm*2);ctx.restore();
      ctx.globalAlpha=0.35+ratio*0.5;ctx.strokeStyle=fillC;ctx.lineWidth=2;
      ctx.save();ctx.translate(sxm,sym);ctx.rotate(ang);
      ctx.strokeRect(-m.range,-thick/2*1.2,m.range*2,thick*1.2);
      ctx.strokeRect(-thick/2*1.2,-m.range,thick*1.2,m.range*2);ctx.restore();
    } else if(style==='fill_cone'){
      const coneAngle=Math.PI/4,coneR=m.range*ratio;
      ctx.globalAlpha=0.35;ctx.strokeStyle='#663';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sxm,sym);ctx.arc(sxm,sym,m.range*1.1,ang-coneAngle,ang+coneAngle);ctx.closePath();ctx.stroke();
      ctx.globalAlpha=0.18+ratio*0.28;ctx.fillStyle=fillC;
      ctx.beginPath();ctx.moveTo(sxm,sym);ctx.arc(sxm,sym,coneR,ang-coneAngle,ang+coneAngle);ctx.closePath();ctx.fill();
    } else if(style==='fill_line'){
      const maxLen=m.range*1.8,lineLen=maxLen*ratio,thick=22;
      ctx.globalAlpha=0.15+ratio*0.25;ctx.fillStyle=fillC;
      ctx.save();ctx.translate(sxm,sym);ctx.rotate(ang);ctx.fillRect(0,-thick/2,lineLen,thick);ctx.restore();
      ctx.globalAlpha=0.5+ratio*0.45;ctx.strokeStyle=fillC;ctx.lineWidth=2.5;
      ctx.save();ctx.translate(sxm,sym);ctx.rotate(ang);ctx.strokeRect(0,-thick/2,lineLen,thick);ctx.restore();
    } else if(style==='fill_ring'){
      const outerR=m.range*1.2,innerR=outerR*(1-ratio*0.6);
      ctx.globalAlpha=0.15+ratio*0.28;ctx.fillStyle=fillC;
      ctx.beginPath();ctx.arc(sxm,sym,outerR,0,Math.PI*2,false);ctx.arc(sxm,sym,innerR,0,Math.PI*2,true);ctx.fill();
      ctx.globalAlpha=0.5+ratio*0.45;ctx.strokeStyle=fillC;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(sxm,sym,innerR,0,Math.PI*2);ctx.stroke();
    } else if(style==='fill_scatter'){
      ctx.globalAlpha=0.55+ratio*0.4;ctx.strokeStyle=fillC;ctx.lineWidth=2;ctx.lineCap='round';
      for(let i=0;i<8;i++){
        const a=ang+(Math.PI*2/8)*i,alen=m.range*0.85*ratio;
        const ex=sxm+Math.cos(a)*alen,ey=sym+Math.sin(a)*alen;
        ctx.beginPath();ctx.moveTo(sxm,sym);ctx.lineTo(ex,ey);ctx.stroke();
      }
    }
    if(ratio>0.75){
      ctx.globalAlpha=(ratio-0.75)/0.25;ctx.fillStyle='#fff';
      ctx.font=`bold ${(12+ratio*5)|0}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⚠',sxm,sym-m.range-10);
    }
    ctx.restore();
  });

  // 총알
  (multiState.bullets||[]).forEach(b=>{
    const sxb=b.x-camX,syb=b.y-camY;
    const blen=b.len||24,tailX=sxb-Math.cos(b.angle)*blen,tailY=syb-Math.sin(b.angle)*blen;
    ctx.save();
    if(b.isMob){
      const mc=b.col||'#f44';ctx.shadowColor=mc;ctx.shadowBlur=12;
      const g=ctx.createLinearGradient(tailX,tailY,sxb,syb);
      g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.3,mc);g.addColorStop(1,mc);
      ctx.strokeStyle=g;ctx.lineWidth=b.w||4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(tailX,tailY);ctx.lineTo(sxb,syb);ctx.stroke();
    } else {
      ctx.shadowColor='#88ddff';ctx.shadowBlur=10;
      const g=ctx.createLinearGradient(tailX,tailY,sxb,syb);
      g.addColorStop(0,'rgba(68,170,255,0)');g.addColorStop(0.4,'rgba(100,200,255,0.7)');g.addColorStop(1,'rgba(220,240,255,1)');
      ctx.strokeStyle=g;ctx.lineWidth=3.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(tailX,tailY);ctx.lineTo(sxb,syb);ctx.stroke();
    }
    ctx.restore();
  });

  // 폭탄
  (multiState.bombs||[]).forEach(b=>{
    const sxb=b.x-camX,syb=b.y-camY;ctx.save();
    if(b.exploded){
      const t=b.explodeTimer/20;ctx.globalAlpha=(1-t)*0.7;ctx.fillStyle='#f84';
      ctx.beginPath();ctx.arc(sxb,syb,b.radius,0,Math.PI*2);ctx.fill();
    } else {
      ctx.shadowColor='#f84';ctx.shadowBlur=12;ctx.fillStyle='#f84';
      const pulse=0.8+0.2*Math.sin(tick*0.3);
      ctx.beginPath();ctx.arc(sxb,syb,8*pulse,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });

  // 스킬 이펙트
  dangerZonesFx.forEach(d=>{
    const sxd=d.x-camX,syd=d.y-camY,t=d.life/(d.type==='thunder'?25:18);
    ctx.save();ctx.globalAlpha=t*0.35;ctx.fillStyle=d.col;
    ctx.beginPath();ctx.arc(sxd,syd,d.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=t*0.8;ctx.strokeStyle=d.col;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(sxd,syd,d.r,0,Math.PI*2);ctx.stroke();ctx.restore();
  });
  dangerZonesFx.forEach(d=>d.life--);
  dangerZonesFx.splice(0,dangerZonesFx.filter(d=>d.life<=0).length);

  // 아이템
  (multiState.items||[]).forEach(it=>{
    if(!me) return;
    if(Math.hypot(it.x-me.x,it.y-me.y)>SIGHT_R*1.2) return;
    const sxi=it.x-camX,syi=it.y-camY;
    const pulse=0.85+0.15*Math.sin((it.pulse||0)*0.1);
    ctx.save();ctx.shadowColor=ITEM_COL[it.type];ctx.shadowBlur=14;ctx.fillStyle=ITEM_COL[it.type];
    ctx.beginPath();ctx.arc(sxi,syi,10*pulse,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.font='12px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ITEM_EMOJI[it.type],sxi,syi);ctx.restore();
  });

  // 몬스터 스프라이트
  monsters.forEach(m=>{
    if(!m.alive) return;
    if(!me) return;
    if(Math.hypot(m.x-me.x,m.y-me.y)>SIGHT_R*1.6) return;
    const sxm=m.x-camX,sym=m.y-camY;
    const sp=SP_MAP[m.type];const sc=m.type==='boss'?3:2;
    const spH=sp?sp.length*sc:m.size*2,spW=sp?sp[0].length*sc:m.size*2;
    ctx.save();
    if(m.warnPhase||m.enraged){ctx.shadowColor=m.enraged?'#f60':'#f44';ctx.shadowBlur=m.enraged?24:16;}
    drawMonsterSprite(ctx,m,sxm,sym);ctx.shadowBlur=0;
    const bw=Math.max(spW,36);
    ctx.fillStyle='#000a';ctx.fillRect(sxm-bw/2-1,sym-spH/2-14,bw+2,7);
    ctx.fillStyle='#e44';ctx.fillRect(sxm-bw/2,sym-spH/2-13,bw*(m.hp/m.maxHp),5);
    if(m.type==='boss'){
      ctx.fillStyle=m.enraged?'#f96':'#fda';ctx.font='bold 12px Noto Sans KR';
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(m.enraged?'🔥 격노한 던전의 군주':'👑 던전의 군주',sxm,sym-spH/2-18);
    }
    ctx.restore();
  });
  monsters=_savedMonsters;

  // Fog
  {
    const psx=me?me.x-camX:W/2,psy=me?me.y-camY:H/2;
    if(!window._fog2||window._fog2.width!==W||window._fog2.height!==H){
      window._fog2=document.createElement('canvas');window._fog2.width=W;window._fog2.height=H;
      window._fog2C=window._fog2.getContext('2d');
    }
    const fc3=window._fog2C;
    fc3.clearRect(0,0,W,H);fc3.fillStyle='rgba(5,8,16,0.93)';fc3.fillRect(0,0,W,H);
    fc3.globalCompositeOperation='destination-out';
    const fg=fc3.createRadialGradient(psx,psy,SIGHT_R*0.35,psx,psy,SIGHT_R);
    fg.addColorStop(0,'rgba(0,0,0,1)');fg.addColorStop(0.6,'rgba(0,0,0,0.92)');fg.addColorStop(1,'rgba(0,0,0,0)');
    fc3.fillStyle=fg;fc3.beginPath();fc3.arc(psx,psy,SIGHT_R,0,Math.PI*2);fc3.fill();
    fc3.globalCompositeOperation='source-over';
    ctx.drawImage(window._fog2,0,0);
  }

  // 파티클
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life/40;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x-camX,p.y-camY,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.88;p.vy*=0.88;p.life--;});
  particles=particles.filter(p=>p.life>0);

  // 공격 FX
  attackFx.forEach(a=>{
    const t=a.life/14;const sxa=a.x-camX,sya=a.y-camY;
    ctx.save();ctx.globalAlpha=t*.55;ctx.strokeStyle='#44aaff';ctx.lineWidth=2;
    ctx.setLineDash([5,5]);ctx.beginPath();ctx.arc(sxa,sya,68,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    ctx.restore();a.life--;
  });
  attackFx=attackFx.filter(a=>a.life>0);

  // 모든 플레이어 스프라이트
  multiState.players.forEach(p=>{
    const sxp=p.x-camX,syp=p.y-camY;
    ctx.save();
    const blinking=p.iframes>0&&Math.floor(tick/4)%2===0;
    if(p.shieldActive>0){
      const sp2=0.8+0.2*Math.sin(tick*0.2);ctx.globalAlpha=0.55*sp2;
      ctx.strokeStyle='#88eeff';ctx.lineWidth=4;ctx.shadowColor='#88eeff';ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(sxp,syp,26,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
    }
    ctx.globalAlpha=!p.alive?0.3:blinking?0.45:1;
    if(p.id===myMultiId&&!blinking){ctx.shadowColor=PCOLORS[p.colorIdx]||'#4af';ctx.shadowBlur=10;}
    drawPlayerSprite(ctx,sxp,syp,p.facing,blinking,p.alive);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    const pname=(p.id===myMultiId?'★ ':'')+p.name;
    ctx.fillStyle=PCOLORS[p.colorIdx]||'#aaddff';ctx.font='bold 10px Noto Sans KR';
    ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(pname,sxp,syp-22);
    const bw=36;ctx.fillStyle='#000a';ctx.fillRect(sxp-bw/2-1,syp-21,bw+2,6);
    ctx.fillStyle=PCOLORS[p.colorIdx]||'#44aaff';ctx.fillRect(sxp-bw/2,syp-20,bw*(Math.max(0,p.hp)/p.maxHp),4);
    ctx.restore();
  });

  ctx.restore(); // shake
  drawMinimap2(multiState.players);
  tick++;
}

function drawMinimap2(players){
  const mW=mmCv.width,mH=mmCv.height;
  const scX=mW/MAP_W,scY=mH/MAP_H;
  mmCtx.fillStyle='#05080f';mmCtx.fillRect(0,0,mW,mH);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!explored[r*COLS+c]) continue;
    mmCtx.fillStyle=tiles[r*COLS+c]===1?'#2a2d50':'#191c36';
    mmCtx.fillRect(c*TILE*scX|0,r*TILE*scY|0,Math.ceil(TILE*scX+.5),Math.ceil(TILE*scY+.5));
  }
  if(bossArena&&explored[Math.floor(bossArena.y/TILE)*COLS+Math.floor(bossArena.x/TILE)]){
    const pulse=.5+.5*Math.sin(tick*.04);mmCtx.strokeStyle=`rgba(255,68,0,${pulse})`;mmCtx.lineWidth=1.5;
    mmCtx.strokeRect(bossArena.x*scX,bossArena.y*scY,bossArena.w*scX,bossArena.h*scY);
  }
  players.forEach(p=>{
    mmCtx.fillStyle=p.id===myMultiId?'#fff':PCOLORS[p.colorIdx]||'#fff';
    mmCtx.beginPath();mmCtx.arc(p.x*scX,p.y*scY,3,0,Math.PI*2);mmCtx.fill();
  });
}

// ── 메인 루프 오버라이드 ──────────────────────────────
const _origLoop=loop;
function loop(t=0){
  rafId=requestAnimationFrame(loop);
  if(multiMode) multiDraw();
  else { update(); draw(); }
}
// rafId 재시작 방지
if(rafId) cancelAnimationFrame(rafId);
rafId=null;

// 포커스
canvas.setAttribute('tabindex','0');
document.getElementById('game').addEventListener('click',()=>canvas.focus());
</script>
